// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    ext.kotlin_version = "1.3.72"
    ext.work_version = "2.4.0"

    repositories {
        google()
        jcenter()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:4.0.0"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

allprojects {
    repositories {
        maven { url 'https://maven.aliyun.com/repository/jcenter' }
        google()
        jcenter()
    }
    ext {
        compileSdkVersion = 29
        buildToolsVersion = "29.0.3"

        applicationId = "com.bob.wanandroid"
        minSdkVersion = 23
        targetSdkVersion = 30
        versionCode = 1
        versionName = "1.0"

        kotlin_stdlib = "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
        kotlin_core_ktx = "androidx.core:core-ktx:1.1.0"
        appcompat = "androidx.appcompat:appcompat:1.2.0"
        material = "com.google.android.material:material:1.1.0"

        lifecycle_runtime = "androidx.lifecycle:lifecycle-runtime:2.2.0"
        lifecycle_common_java8 = "androidx.lifecycle:lifecycle-common-java8:2.2.0"
        lifecycle_extensions = "androidx.lifecycle:lifecycle-extensions:2.2.0"
        lifecycle_viewmodel = "androidx.lifecycle:lifecycle-viewmodel:2.2.0"
        lifecycle_livedata = "androidx.lifecycle:lifecycle-livedata:2.2.0"
        navigation = "androidx.navigation:navigation-runtime:2.2.1"

        work_runtime = "androidx.work:work-runtime:$work_version"
        work_runtime_ktx = "androidx.work:work-runtime-ktx:$work_version"
        work_rxjava2 = "androidx.work:work-rxjava2:$work_version"
        work_gcm = "androidx.work:work-gcm:$work_version"

        constraintlayout = "androidx.constraintlayout:constraintlayout:2.0.0-beta4"
        material = "com.google.android.material:material:1.2.0-alpha05"
        recyclerView = "androidx.recyclerview:recyclerview:1.1.0"
        glide = "com.github.bumptech.glide:glide:4.11.0"
        glide_compiler = "com.github.bumptech.glide:compiler:4.11.0"
        gson = "com.google.code.gson:gson:2.8.6"

        unpeek_livedata = "com.kunminx.archi:unpeek-livedata:3.2.3-beta10"
        smooth_navigation = "com.kunminx.archi:smooth-navigation:3.3.2-beta5"
        strict_databinding = "com.kunminx.archi:strict-databinding:3.3.2-beta2"
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}